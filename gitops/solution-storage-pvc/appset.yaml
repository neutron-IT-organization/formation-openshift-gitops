apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: solution-storage-pvc
  namespace: openshift-gitops
spec:
  generators:
  - list:
      elements:
      - city: tokyo
      - city: paris
      - city: londres
      - city: rome
      - city: sydney
      - city: rio
      - city: istanbul
      - city: berlin
      - city: nairobi
      - city: madrid
  template:
    metadata:
      name: 'solution-storage-pvc-{{city}}'
    spec:
      project: formation-openshift
      source:
        repoURL: https://github.com/neutron-IT-organization/formation-openshift-gitops.git
        targetRevision: dev
        path: gitops/solution-storage-pvc/base
      destination:
        server: https://kubernetes.default.svc
        namespace: '{{city}}-user-ns'
      syncPolicy:
        syncOptions:
          - CreateNamespace=false
