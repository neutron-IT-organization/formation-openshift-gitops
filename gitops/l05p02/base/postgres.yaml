---
apiVersion: v1
kind: Secret
metadata:
  name: postgres-credentials
  labels:
    formation: l05p02
type: Opaque
data:
  POSTGRES_DB: dGFzaw==          # task
  POSTGRES_PASSWORD: bXlzZWNyZXRwYXNzd29yZA==  # mysecretpassword
  POSTGRES_PORT: NTQzMg==        # 5432
  POSTGRES_USER: dGFzay11c2Vy   # task-user
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  labels:
    app: postgres
    formation: l05p02
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      volumes:
        - name: postgres-storage
          emptyDir: {}
      containers:
        - name: postgres
          image: registry.access.redhat.com/rhscl/postgresql-12-rhel7:latest
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRESQL_USER
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: POSTGRES_USER
            - name: POSTGRESQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: POSTGRES_PASSWORD
            - name: POSTGRESQL_DATABASE
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: POSTGRES_DB
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          volumeMounts:
            - name: postgres-storage
              mountPath: /var/lib/pgsql/data
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-service
  labels:
    formation: l05p02
spec:
  selector:
    app: postgres
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
  type: ClusterIP
