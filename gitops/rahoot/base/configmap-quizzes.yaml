apiVersion: v1
kind: ConfigMap
metadata:
  name: rahoot-quiz-config
  namespace: rahoot
data:
  presentation-openshift.json: |
    {
      "subject": "Présentation d'OpenShift",
      "questions": [
        {
          "question": "D'après le cours, qu'est-ce qu'un conteneur ?",
          "answers": ["Une grosse machine virtuelle", "Une unité légère contenant l'application et ses dépendances", "Un serveur physique", "Un simple fichier texte"],
          "solution": 1,
          "cooldown": 5,
          "time": 20
        },
        {
          "question": "OpenShift est une plateforme basée sur quel orchestrateur open source ?",
          "answers": ["Docker", "Kubernetes", "Linux", "Windows"],
          "solution": 1,
          "cooldown": 5,
          "time": 20
        },
        {
          "question": "Quel est l'avantage principal de la portabilité des conteneurs ?",
          "answers": ["Ils sont gratuits", "Ils fonctionnent de la même manière partout (laptop, cloud, prod)", "Ils n'ont pas besoin d'internet", "Ils sont plus jolis"],
          "solution": 1,
          "cooldown": 5,
          "time": 20
        },
        {
          "question": "Sur OpenShift, par défaut, un conteneur peut-il s'exécuter avec les droits 'root' (administrateur) ?",
          "answers": ["Oui, toujours", "Non, c'est interdit par défaut pour la sécurité", "Seulement le lundi", "Seulement si on utilise Docker"],
          "solution": 1,
          "cooldown": 5,
          "time": 20
        },
        {
          "question": "Un conteneur démarre-t-il plus vite qu'une machine virtuelle ?",
          "answers": ["Non, c'est pareil", "Oui, en quelques secondes", "Non, c'est beaucoup plus lent", "Seulement sur OpenShift"],
          "solution": 1,
          "cooldown": 5,
          "time": 20
        },
        {
          "question": "Quelle entreprise développe et supporte la plateforme OpenShift ?",
          "answers": ["Microsoft", "Google", "Red Hat", "Amazon"],
          "solution": 2,
          "cooldown": 5,
          "time": 20
        },
        {
          "question": "D'après le cours, que se passe-t-il si un programme tourne dans un conteneur et qu'il plante ?",
          "answers": ["Tout le serveur s'arrête", "Seul le conteneur est affecté sans toucher aux autres", "Il faut racheter un serveur", "OpenShift s'éteint"],
          "solution": 1,
          "cooldown": 5,
          "time": 20
        }
      ]
    }
  architecture-openshift.json: |
    {
      "subject": "Architecture OpenShift et Kubernetes",
      "questions": [
        {
          "question": "Comment appelle-t-on le 'cerveau' du cluster qui prend toutes les décisions ?",
          "answers": ["Le Plan de contrôle (Control Plane)", "Le disque dur", "Le câble réseau", "L'écran de l'administrateur"],
          "solution": 0,
          "cooldown": 5,
          "time": 20
        },
        {
          "question": "Où OpenShift stocke-t-il toutes les informations et la configuration du cluster ?",
          "answers": ["Dans un fichier Excel", "Dans la base de données etcd", "Sur une clé USB", "Dans le cloud Google"],
          "solution": 1,
          "cooldown": 5,
          "time": 20
        },
        {
          "question": "Quel composant choisit sur quel serveur un pod doit être placé ?",
          "answers": ["Le comptable", "Le scheduler (kube-scheduler)", "Le navigateur web", "Le pare-feu"],
          "solution": 1,
          "cooldown": 5,
          "time": 20
        },
        {
          "question": "Comment appelle-t-on les serveurs qui font tourner les applications des utilisateurs ?",
          "answers": ["Les nœuds de contrôle", "Les nœuds de calcul (Workers)", "Les routeurs", "Les clients"],
          "solution": 1,
          "cooldown": 5,
          "time": 20
        },
        {
          "question": "Quel agent tourne sur CHAQUE nœud pour surveiller et lancer les pods ?",
          "answers": ["L'antivirus", "Le kubelet", "Le plugin Flash", "Le BIOS"],
          "solution": 1,
          "cooldown": 5,
          "time": 20
        },
        {
          "question": "D'après le cours, que fait OpenShift si un serveur (nœud) tombe en panne ?",
          "answers": ["Il attend que l'humain répare", "Il déplace et redémarre automatiquement les applications sur un autre nœud fonctionnel", "Il supprime toutes les données", "Il arrête le cluster entier"],
          "solution": 1,
          "cooldown": 5,
          "time": 20
        },
        {
          "question": "Quel est le point d'entrée unique pour toutes les commandes (oc, console, API) sur le cluster ?",
          "answers": ["Le site de Red Hat", "L'API Server", "Le terminal de l'ordinateur", "La base de données"],
          "solution": 1,
          "cooldown": 5,
          "time": 20
        },
        {
          "question": "Quel est l'OS (système d'exploitation) spécialisé utilisé par les nœuds OpenShift ?",
          "answers": ["Windows Server", "Red Hat Enterprise Linux CoreOS (RHCOS)", "Ubuntu", "macOS"],
          "solution": 1,
          "cooldown": 5,
          "time": 20
        }
      ]
    }
  workloads-openshift.json: |
    {
      "subject": "Les Workloads dans OpenShift",
      "questions": [
        {
          "question": "Quelle est l'unité de base dans Kubernetes qui contient vos conteneurs ?",
          "answers": ["Une boîte", "Un Pod", "Un dossier", "Un processus"],
          "solution": 1,
          "cooldown": 5,
          "time": 20
        },
        {
          "question": "Quel objet utilise-t-on pour déployer une application web simple (sans données locales) ?",
          "answers": ["Un Deployment", "Un fichier ZIP", "Une disquette", "Un script"],
          "solution": 0,
          "cooldown": 5,
          "time": 20
        },
        {
          "question": "Si mon application a besoin de stocker des fichiers de manière permanente (base de données), j'utilise :",
          "answers": ["Un Deployment", "Un StatefulSet", "Un Pod seul", "Rien"],
          "solution": 1,
          "cooldown": 5,
          "time": 20
        },
        {
          "question": "Quel objet permet de s'assurer qu'un pod de surveillance tourne sur CHAQUE serveur du cluster ?",
          "answers": ["Un Deployment", "Un DaemonSet", "Un CronJob", "Un Service"],
          "solution": 1,
          "cooldown": 5,
          "time": 20
        },
        {
          "question": "Qu'est-ce que le nombre de 'réplicas' ?",
          "answers": ["Le prix de l'application", "Le nombre d'exemplaires identiques de mon application qui tournent en même temps", "La version du code", "Le nom de l'utilisateur"],
          "solution": 1,
          "cooldown": 5,
          "time": 20
        },
        {
          "question": "Est-il recommandé de créer des pods 'nus' (sans Deployment) en production ?",
          "answers": ["Oui pour aller plus vite", "Non, car s'ils tombent, personne ne les redémarrera", "Oui c'est la norme", "Seulement pour les bases de données"],
          "solution": 1,
          "cooldown": 5,
          "time": 20
        },
        {
          "question": "Si je me trompe dans une mise à jour, OpenShift permet de revenir à la version d'avant. C'est le :",
          "answers": ["Formatage", "Rollback", "Suppression", "Restart"],
          "solution": 1,
          "cooldown": 5,
          "time": 20
        },
        {
          "question": "Comment appelle-t-on le mécanisme qui vérifie en permanence que l'état réel correspond à ce qu'on a demandé ?",
          "answers": ["La surveillance humaine", "La boucle de réconciliation (contrôleur)", "L'antivirus", "Le pare-feu"],
          "solution": 1,
          "cooldown": 5,
          "time": 20
        }
      ]
    }
  reseaux-openshift.json: |
    {
      "subject": "Les réseaux dans OpenShift",
      "questions": [
        {
          "question": "Chaque pod dans OpenShift possède-t-il sa propre adresse IP ?",
          "answers": ["Non, ils partagent tous la même", "Oui, chaque pod a une IP unique", "Seulement les pods admin", "Seulement si on paye"],
          "solution": 1,
          "cooldown": 5,
          "time": 20
        },
        {
          "question": "Quel objet fournit une adresse FIXE pour accéder à un groupe de pods (même s'ils redémarrent) ?",
          "answers": ["Un Service", "Un post-it", "Une Route", "Un câble"],
          "solution": 0,
          "cooldown": 5,
          "time": 20
        },
        {
          "question": "Comment rend-on une application accessible depuis INTERNET pour les utilisateurs ?",
          "answers": ["En ouvrant le serveur", "Via une Route (ou Ingress)", "En envoyant un mail", "Ce n'est pas possible"],
          "solution": 1,
          "cooldown": 5,
          "time": 20
        },
        {
          "question": "D'après le cours, doit-on configurer une application en utilisant l'IP directe d'un pod ?",
          "answers": ["Oui c'est plus rapide", "Non, car l'IP change si le pod redémarre (utiliser le nom du Service)", "Oui c'est obligatoire", "Seulement en développement"],
          "solution": 1,
          "cooldown": 5,
          "time": 20
        },
        {
          "question": "Quel objet permet d'interdire ou de filtrer les communications entre certains pods ?",
          "answers": ["Un antivol", "Une NetworkPolicy (politique réseau)", "Un mot de passe", "Une Route"],
          "solution": 1,
          "cooldown": 5,
          "time": 20
        },
        {
          "question": "Comment appelle-t-on le réseau 'virtuel' qui relie tous les pods entre eux ?",
          "answers": ["L'Internet public", "Le SDN (Software Defined Network)", "Le Wi-Fi du cluster", "Le réseau en cuivre"],
          "solution": 1,
          "cooldown": 5,
          "time": 20
        },
        {
          "question": "Par défaut, les pods d'un même cluster peuvent-ils se parler entre eux ?",
          "answers": ["Non, tout est bloqué", "Oui, le réseau est ouvert par défaut entre les pods", "Seulement s'ils sont sur le même serveur", "Seulement via HTTPS"],
          "solution": 1,
          "cooldown": 5,
          "time": 20
        },
        {
          "question": "Quel composant gère les règles réseau et le trafic sur les nœuds ?",
          "answers": ["Le navigateur", "Le plugin réseau (ex: OVN-Kubernetes)", "La carte graphique", "Le clavier"],
          "solution": 1,
          "cooldown": 5,
          "time": 20
        }
      ]
    }
  administration-openshift.json: |
    {
      "subject": "Gestion et administration du cluster",
      "questions": [
        {
          "question": "Quel rôle donne tous les droits (super-admin) sur l'ensemble du cluster ?",
          "answers": ["view", "cluster-admin", "edit", "basic-user"],
          "solution": 1,
          "cooldown": 5,
          "time": 20
        },
        {
          "question": "Qu'est-ce qu'un Namespace (ou Projet) dans OpenShift ?",
          "answers": ["Un nom d'ordinateur", "Un espace isolé pour ranger les ressources d'une application ou d'une équipe", "Un mot de passe", "Un type de serveur"],
          "solution": 1,
          "cooldown": 5,
          "time": 20
        },
        {
          "question": "Quelle commande utilise-t-on dans le terminal pour piloter OpenShift ?",
          "answers": ["ls", "oc", "cd", "cmd"],
          "solution": 1,
          "cooldown": 5,
          "time": 20
        },
        {
          "question": "Comment appelle-t-on le mécanisme qui associe un utilisateur à des droits spécifiques ?",
          "answers": ["Un RoleBinding", "Un mot de passe", "Un identifiant", "Une signature"],
          "solution": 0,
          "cooldown": 5,
          "time": 20
        },
        {
          "question": "Où peut-on voir graphiquement l'état de santé et la consommation du cluster ?",
          "answers": ["Sur YouTube", "Dans la console web OpenShift (section Monitoring)", "Dans un e-mail hebdomadaire", "Sur l'écran du serveur"],
          "solution": 1,
          "cooldown": 5,
          "time": 20
        },
        {
          "question": "D'après le cours, le compte 'kubeadmin' doit-il être conservé pour toujours ?",
          "answers": ["Oui", "Non, il faut le supprimer après avoir créé un vrai compte administrateur sécurisé", "Seulement si on a plus de 3 nœuds", "Oui, Red Hat l'oblige"],
          "solution": 1,
          "cooldown": 5,
          "time": 20
        },
        {
          "question": "Un rôle de type 'edit' permet-il de supprimer le cluster entier ?",
          "answers": ["Oui", "Non, il permet de modifier les applications mais pas de détruire le cluster", "Seulement s'il n'y a personne d'autre", "Oui, le dimanche"],
          "solution": 1,
          "cooldown": 5,
          "time": 20
        },
        {
          "question": "Que permet de faire la section 'User Management' de la console ?",
          "answers": ["Changer de fond d'écran", "Gérer les utilisateurs, les groupes et leurs droits", "Éteindre les serveurs", "Jouer à des jeux"],
          "solution": 1,
          "cooldown": 5,
          "time": 20
        }
      ]
    }
