apiVersion: v1
kind: ConfigMap
metadata:
  name: rahoot-quiz-config
  namespace: rahoot
data:
  presentation-openshift.json: |
    {
      "subject": "Présentation d'OpenShift",
      "questions": [
        {
          "question": "D'après le cours, quels sont les deux mécanismes Linux qui permettent l'isolation des processus dans un conteneur ?",
          "answers": ["SELinux et AppArmor", "Namespaces et cgroups", "iptables et firewalld", "chroot et virtualisation"],
          "solution": 1,
          "cooldown": 5,
          "time": 20
        },
        {
          "question": "Sur quel système interne de Google Kubernetes s'est-il basé à l'origine ?",
          "answers": ["MapReduce", "Borg", "Chubby", "Google Cloud"],
          "solution": 1,
          "cooldown": 5,
          "time": 20
        },
        {
          "question": "Quel standard (OCI) définit le format portable des images de conteneurs ?",
          "answers": ["Open Container Initiative", "Cloud Native Foundation", "Docker Standard Format", "Kubernetes Image Spec"],
          "solution": 0,
          "cooldown": 5,
          "time": 20
        },
        {
          "question": "Quelle ressource spécifique à OpenShift permet de contrôler finement les permissions de sécurité des pods (comme interdire root) ?",
          "answers": ["NetworkPolicy", "SecurityContextConstraints (SCC)", "Pod Security Admission", "SELinux Labels"],
          "solution": 1,
          "cooldown": 5,
          "time": 20
        },
        {
          "question": "Comment s'appelle la technologie OpenShift qui transforme directement un dépôt Git en image sans Dockerfile ?",
          "answers": ["Tekton", "Source-to-Image (S2I)", "ArgoCD", "Buildah"],
          "solution": 1,
          "cooldown": 5,
          "time": 20
        },
        {
          "question": "Quelle est la principale différence entre une Route OpenShift et un Ingress Kubernetes ?",
          "answers": ["Les Routes supportent uniquement HTTP", "Les Routes offrent des options TLS avancées (Edge, Passthrough, Reencrypt)", "Les Ingress sont plus rapides", "Il n'y a aucune différence"],
          "solution": 1,
          "cooldown": 5,
          "time": 20
        },
        {
          "question": "Le cours indique qu'on peut faire tourner beaucoup plus de conteneurs que de VMs sur un hôte. Quel est l'ordre de grandeur ?",
          "answers": ["Le même nombre", "Centaines de conteneurs vs dizaines de VMs", "10 conteneurs maximum", "Moins de conteneurs car ils partagent le noyau"],
          "solution": 1,
          "cooldown": 5,
          "time": 20
        },
        {
          "question": "Sur OpenShift, qu'arrive-t-il par défaut à un conteneur qui tente de s'exécuter en tant qu'utilisateur root ?",
          "answers": ["Il fonctionne normalement", "Il est rejeté par défaut pour des raisons de sécurité", "Il démarre en mode dégradé", "Il est automatiquement converti"],
          "solution": 1,
          "cooldown": 5,
          "time": 20
        }
      ]
    }
  architecture-openshift.json: |
    {
      "subject": "Architecture OpenShift et Kubernetes",
      "questions": [
        {
          "question": "Quel algorithme de consensus est utilisé par etcd pour garantir la cohérence des données ?",
          "answers": ["Paxos", "Raft", "Zab", "Bitcoin"],
          "solution": 1,
          "cooldown": 5,
          "time": 20
        },
        {
          "question": "En combien d'étapes (dites dans le cours) le kube-scheduler choisit-il le nœud pour un pod ?",
          "answers": ["1 (direct)", "2 (filtrage et scoring)", "3 (filtrage, scoring et assignation)", "4 (audit complet)"],
          "solution": 2,
          "cooldown": 5,
          "time": 20
        },
        {
          "question": "Quel opérateur OpenShift est responsable des mises à jour globales de la plateforme ?",
          "answers": ["Machine Config Operator", "Cluster Version Operator (CVO)", "Network Operator", "Monitoring Operator"],
          "solution": 1,
          "cooldown": 5,
          "time": 20
        },
        {
          "question": "Quelle caractéristique majeure distingue l'OS RHCOS (CoreOS) d'un Linux classique ?",
          "answers": ["Il utilise Docker", "Son système de fichiers root est en lecture seule (immuable)", "Il ne supporte pas SSH", "Il est plus lourd"],
          "solution": 1,
          "cooldown": 5,
          "time": 20
        },
        {
          "question": "Quelle commande 'oc' permet d'ouvrir un shell de débogage sur un nœud sans utiliser SSH ?",
          "answers": ["oc rsh node", "oc debug node/<nom>", "oc exec -it node", "oc login node"],
          "solution": 1,
          "cooldown": 5,
          "time": 20
        },
        {
          "question": "Lors d'une modification de configuration via MCO, comment les nœuds sont-ils redémarrés ?",
          "answers": ["Tous en même temps", "Un par un, de manière contrôlée", "Aucun redémarrage n'est nécessaire", "Uniquement la nuit"],
          "solution": 1,
          "cooldown": 5,
          "time": 20
        },
        {
          "question": "Quel mode d'installation est requis pour le bare-metal ou les réseaux très contraints ?",
          "answers": ["IPI (Installer Provisioned)", "UPI (User Provisioned)", "Installation manuelle via PXE", "Ansible uniquement"],
          "solution": 1,
          "cooldown": 5,
          "time": 20
        },
        {
          "question": "Quel contrôleur du plan de contrôle détecte qu'un nœud est tombé et doit reprogrammer les pods ?",
          "answers": ["Deployment controller", "Node controller", "ReplicaSet controller", "Job controller"],
          "solution": 1,
          "cooldown": 5,
          "time": 20
        }
      ]
    }
  workloads-openshift.json: |
    {
      "subject": "Les Workloads dans OpenShift",
      "questions": [
        {
          "question": "Pourquoi le cours déconseille-t-il de créer des pods nus (kind: Pod) en production ?",
          "answers": ["Ils sont trop lents", "Ils ne sont pas recréés automatiquement en cas de panne", "Ils ne peuvent pas avoir d'IP", "Ils sont interdits par OpenShift"],
          "solution": 1,
          "cooldown": 5,
          "time": 20
        },
        {
          "question": "Les DeploymentConfig sont dépréciés. Quel objet standard Kubernetes doit-on utiliser aujourd'hui ?",
          "answers": ["StatefulSet", "Deployment", "ReplicaSet", "ReplicationController"],
          "solution": 1,
          "cooldown": 5,
          "time": 20
        },
        {
          "question": "Qu'est-ce qu'un contrôleur (controller) dans Kubernetes ?",
          "answers": ["Un script de démarrage", "Une boucle de réconciliation (état réel vs état désiré)", "Un plugin réseau", "Le nom de l'API Server"],
          "solution": 1,
          "cooldown": 5,
          "time": 20
        },
        {
          "question": "Quelle est la question clé (citée dans le cours) pour choisir entre un Deployment et un StatefulSet ?",
          "answers": ["L'application est-elle en Java ?", "L'application conserve-t-elle un état local (data) ?", "L'app a-t-elle plus de 3 réplicas ?", "L'app utilise-t-elle du HTTPS ?"],
          "solution": 1,
          "cooldown": 5,
          "time": 20
        },
        {
          "question": "Quelle caractéristique est propre aux pods d'un StatefulSet ?",
          "answers": ["Ils n'ont pas de nom", "Ils ont un nom stable (ex: pod-0) et un stockage (PVC) qui leur est attaché", "Ils redémarrent plus vite", "Ils ne peuvent pas être scalés"],
          "solution": 1,
          "cooldown": 5,
          "time": 20
        },
        {
          "question": "Quel workload est idéal pour déployer un agent de log ou de monitoring sur CHAQUE nœud du cluster ?",
          "answers": ["Deployment", "DaemonSet", "StatefulSet", "Job"],
          "solution": 1,
          "cooldown": 5,
          "time": 20
        },
        {
          "question": "Quel objet de niveau inférieur est créé par un Deployment pour gérer les réplicas ?",
          "answers": ["PodDirect", "ReplicaSet", "ContainerInfo", "ServiceAccount"],
          "solution": 1,
          "cooldown": 5,
          "time": 20
        },
        {
          "question": "Quelle est la principale différence entre un ReplicaSet et l'ancien ReplicationController ?",
          "answers": ["Le ReplicaSet est plus lent", "Le ReplicaSet supporte des sélecteurs plus flexibles (matchExpressions)", "Il n'y a aucune différence", "Le ReplicationController est plus récent"],
          "solution": 1,
          "cooldown": 5,
          "time": 20
        }
      ]
    }
  reseaux-openshift.json: |
    {
      "subject": "Les réseaux dans OpenShift",
      "questions": [
        {
          "question": "Comment communiquent entre eux les conteneurs situés dans un MÊME pod ?",
          "answers": ["Via une IP externe", "Via localhost (ils partagent le même réseau)", "Ils ne peuvent pas communiquer", "Via un service dédié"],
          "solution": 1,
          "cooldown": 5,
          "time": 20
        },
        {
          "question": "Le cours dit que les IPs de pods sont éphémères. Quelle est la règle d'or ?",
          "answers": ["Toujours utiliser l'IP directe", "Ne jamais coder en dur un IP de pod (utiliser un Service)", "Changer l'IP manuellement", "Utiliser des IPs fixes via annotation"],
          "solution": 1,
          "cooldown": 5,
          "time": 20
        },
        {
          "question": "Quel est le plugin réseau (CNI) par défaut dans les versions récentes d'OpenShift ?",
          "answers": ["OpenShift SDN", "OVN-Kubernetes", "Calico", "Cilium"],
          "solution": 1,
          "cooldown": 5,
          "time": 20
        },
        {
          "question": "Quel opérateur OpenShift déploie et configure le réseau (CNI) sur les nœuds ?",
          "answers": ["Cluster Network Operator (CNO)", "Machine Config Operator", "Cloud Operator", "Ingress Operator"],
          "solution": 0,
          "cooldown": 5,
          "time": 20
        },
        {
          "question": "Comment les pods communiquent-ils entre eux s'ils sont sur des nœuds différents ?",
          "answers": ["Via Internet", "Via un tunnel (VXLAN ou Geneve) créé par le SDN", "Via un câble physique direct", "Via SSH"],
          "solution": 1,
          "cooldown": 5,
          "time": 20
        },
        {
          "question": "À quoi servent les NetworkPolicies dans OpenShift ?",
          "answers": ["À accélérer le réseau", "À isoler et contrôler les flux entre les pods (Ingress/Egress)", "À donner des noms aux pods", "À configurer le Wi-Fi"],
          "solution": 1,
          "cooldown": 5,
          "time": 20
        },
        {
          "question": "Sans SDN (réseau virtuel), quel serait le problème majeur ?",
          "answers": ["On ne pourrait pas créer de pods", "Les pods sur différents nœuds ne pourraient pas se parler sans NAT complexe", "Le cluster serait trop rapide", "Les secrets ne seraient pas chiffrés"],
          "solution": 1,
          "cooldown": 5,
          "time": 20
        },
        {
          "question": "Laquelle de ces commandes permet de voir la configuration du réseau du cluster ?",
          "answers": ["oc get pods", "oc get network.operator cluster -o yaml", "oc get nodes", "oc debug node"],
          "solution": 1,
          "cooldown": 5,
          "time": 20
        }
      ]
    }
  administration-openshift.json: |
    {
      "subject": "Gestion et administration du cluster",
      "questions": [
        {
          "question": "Quand est-il recommandé de supprimer le compte temporaire 'kubeadmin' ?",
          "answers": ["Dès qu'on a un IdP (ex: htpasswd) et au moins un cluster-admin", "Jamais, c'est indispensable", "Après 10 minutes", "Seulement si on pirate le cluster"],
          "solution": 0,
          "cooldown": 5,
          "time": 20
        },
        {
          "question": "Quelle commande permet de créer un fichier htpasswd avec le PREMIER utilisateur ?",
          "answers": ["htpasswd -B user pass", "htpasswd -c -B -b /tmp/htpasswd user pass", "oc create htpasswd", "openssl htpasswd"],
          "solution": 1,
          "cooldown": 5,
          "time": 20
        },
        {
          "question": "Un RoleBinding qui pointe vers un ClusterRole donne des droits dans quel périmètre ?",
          "answers": ["Tout le cluster", "Uniquement dans son propre namespace", "Tous les namespaces sauf un", "Aucun droit"],
          "solution": 1,
          "cooldown": 5,
          "time": 20
        },
        {
          "question": "Quel opérateur gère Prometheus, Alertmanager et Grafana sur OpenShift ?",
          "answers": ["Machine Config Operator", "Cluster Monitoring Operator", "Cluster Version Operator", "Storage Operator"],
          "solution": 1,
          "cooldown": 5,
          "time": 20
        },
        {
          "question": "Quel type d'utilisateur est une identité d'application (comme system:serviceaccount...) ?",
          "answers": ["Utilisateur standard", "Compte de service (ServiceAccount)", "Utilisateur système", "Invité"],
          "solution": 1,
          "cooldown": 5,
          "time": 20
        },
        {
          "question": "Comment supprime-t-on proprement le secret kubeadmin du cluster ?",
          "answers": ["oc delete user kubeadmin", "oc delete secret kubeadmin -n kube-system", "oc patch oauth", "Plus besoin de le supprimer"],
          "solution": 1,
          "cooldown": 5,
          "time": 20
        },
        {
          "question": "Quelle ressource regroupe les nœuds (ex: master, worker) pour appliquer une configuration commune ?",
          "answers": ["MachineSet", "MachineConfigPool (MCP)", "NodeSelector", "Ingress"],
          "solution": 1,
          "cooldown": 5,
          "time": 20
        },
        {
          "question": "Pourquoi utiliser un ClusterRole avec un simple RoleBinding ?",
          "answers": ["C'est impossible", "Pour réutiliser un rôle commun tout en limitant l'accès au namespace local", "Pour devenir admin du cluster", "Pour contourner le parfeu"],
          "solution": 1,
          "cooldown": 5,
          "time": 20
        }
      ]
    }
