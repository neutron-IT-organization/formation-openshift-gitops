apiVersion: config.openshift.io/v1
kind: OAuth
metadata:
  name: cluster
  annotations:
    argocd.argoproj.io/sync-options: Prune=false
spec:
  identityProviders:
  - htpasswd:
      fileData:
        name: htpasswd-formation
    mappingMethod: claim
    name: Neutron Guest Identity Management
    type: HTPasswd
---
apiVersion: v1
kind: Secret
metadata:
  name: htpasswd-formation
  namespace: openshift-config
  annotations:
    argocd.argoproj.io/sync-options: Prune=false
    argocd.argoproj.io/compare-options: IgnoreExtraneous
type: Opaque
data:
  htpasswd: {{ include "openshift-htpasswd" . | b64enc | quote }}
  users.txt: {{ include "openshift-users-txt" . | b64enc | quote }}
{{- range $user := .Values.openshift.users }}
{{- $username := printf "%s-user" $user }}
{{- $namespace := printf "%s-user-ns" $user }}
---
# ============================================================
# Configuration pour l'utilisateur {{ $username }}
# Namespace: {{ $namespace }}
# ============================================================

# ClusterRoleBinding: permet à l'utilisateur de créer ses propres projets
kind: ClusterRoleBinding
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: {{ $username }}-self-provisioner
  annotations:
    argocd.argoproj.io/sync-options: Prune=false
subjects:
  - kind: User
    name: {{ $username | quote }}
    apiGroup: rbac.authorization.k8s.io
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: self-provisioner
---
# RoleBinding: l'utilisateur est admin de son namespace
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ $username }}-admin
  namespace: {{ $namespace }}
  annotations:
    argocd.argoproj.io/sync-options: Prune=false
subjects:
  - kind: User
    name: {{ $username | quote }}
    apiGroup: rbac.authorization.k8s.io
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: admin
---
# RoleBinding: accès en lecture au namespace partagé l03p02 (exercice 2.2)
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ $username }}-l03p02-view
  namespace: l03p02
  annotations:
    argocd.argoproj.io/sync-options: Prune=false
subjects:
  - kind: User
    name: {{ $username | quote }}
    apiGroup: rbac.authorization.k8s.io
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: view
---
# ResourceQuota: limite les ressources consommées dans le namespace
apiVersion: v1
kind: ResourceQuota
metadata:
  name: formation-quota
  namespace: {{ $namespace }}
  annotations:
    argocd.argoproj.io/sync-options: Prune=false
spec:
  hard:
    requests.cpu: {{ $.Values.openshift.namespace.quota.requestsCpu | quote }}
    requests.memory: {{ $.Values.openshift.namespace.quota.requestsMemory | quote }}
    limits.cpu: {{ $.Values.openshift.namespace.quota.limitsCpu | quote }}
    limits.memory: {{ $.Values.openshift.namespace.quota.limitsMemory | quote }}
    pods: {{ $.Values.openshift.namespace.quota.pods | quote }}
    services: {{ $.Values.openshift.namespace.quota.services | quote }}
    persistentvolumeclaims: {{ $.Values.openshift.namespace.quota.persistentvolumeclaims | quote }}
    requests.storage: {{ $.Values.openshift.namespace.quota.requestsStorage | quote }}
---
# LimitRange: valeurs par défaut de resources pour les conteneurs
apiVersion: v1
kind: LimitRange
metadata:
  name: formation-limits
  namespace: {{ $namespace }}
  annotations:
    argocd.argoproj.io/sync-options: Prune=false
spec:
  limits:
  - type: Container
    default:
      cpu: {{ $.Values.openshift.namespace.limitrange.defaultCpu | quote }}
      memory: {{ $.Values.openshift.namespace.limitrange.defaultMemory | quote }}
    defaultRequest:
      cpu: {{ $.Values.openshift.namespace.limitrange.defaultRequestCpu | quote }}
      memory: {{ $.Values.openshift.namespace.limitrange.defaultRequestMemory | quote }}
    max:
      cpu: {{ $.Values.openshift.namespace.limitrange.maxCpu | quote }}
      memory: {{ $.Values.openshift.namespace.limitrange.maxMemory | quote }}
---
# NetworkPolicy: autoriser le trafic dans le même namespace
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-same-namespace
  namespace: {{ $namespace }}
  annotations:
    argocd.argoproj.io/sync-options: Prune=false
spec:
  podSelector: {}
  ingress:
  - from:
    - podSelector: {}
  policyTypes:
  - Ingress
---
# NetworkPolicy: autoriser le trafic depuis l'ingress controller OpenShift (Routes)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-from-openshift-ingress
  namespace: {{ $namespace }}
  annotations:
    argocd.argoproj.io/sync-options: Prune=false
spec:
  podSelector: {}
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          network.openshift.io/policy-group: ingress
  policyTypes:
  - Ingress
---
# NetworkPolicy: autoriser le trafic depuis le monitoring OpenShift
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-from-openshift-monitoring
  namespace: {{ $namespace }}
  annotations:
    argocd.argoproj.io/sync-options: Prune=false
spec:
  podSelector: {}
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          network.openshift.io/policy-group: monitoring
  policyTypes:
  - Ingress
{{- end }}
