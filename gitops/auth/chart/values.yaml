openshift:
  # Mot de passe commun pour tous les utilisateurs de la formation
  # IMPORTANT: Changez ce mot de passe avant la formation !
  defaultPassword: "OpenShift4formation!"

  users:
  - tokyo
  - paris
  - londres
  - rome
  - sydney
  - rio
  - istanbul
  - berlin
  - nairobi
  - madrid

  # Quotas appliqués à chaque namespace étudiant
  # Le terminal web OpenShift nécessite : requests.cpu=200m, limits.cpu=800m,
  # requests.memory=256Mi, limits.memory=640Mi — les quotas doivent l'accommoder.
  namespace:
    quota:
      requestsCpu: "2"
      requestsMemory: "2Gi"
      limitsCpu: "4"
      limitsMemory: "4Gi"
      pods: "15"
      services: "10"
      persistentvolumeclaims: "5"
      requestsStorage: "15Gi"
    limitrange:
      defaultCpu: "20m"
      defaultMemory: "32Mi"
      defaultRequestCpu: "1m"
      defaultRequestMemory: "8Mi"
      maxCpu: "1"
      maxMemory: "1Gi"
