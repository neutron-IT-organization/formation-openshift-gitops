openshift:
  # Mot de passe commun pour tous les utilisateurs de la formation
  # IMPORTANT: Changez ce mot de passe avant la formation !
  defaultPassword: "OpenShift4formation!"

  users:
  - tokyo
  - paris
  - londres
  - rome
  - sydney
  - rio
  - istanbul
  - berlin
  - nairobi
  - madrid

  # Quotas appliqués à chaque namespace étudiant
  namespace:
    quota:
      requestsCpu: "0.1"
      requestsMemory: "256Mi"
      limitsCpu: "0.3"
      limitsMemory: "512Mi"
      pods: "10"
      services: "10"
      persistentvolumeclaims: "5"
      requestsStorage: "10Gi"
    limitrange:
      defaultCpu: "20m"
      defaultMemory: "32Mi"
      defaultRequestCpu: "1m"
      defaultRequestMemory: "8Mi"
      maxCpu: "1"
      maxMemory: "1Gi"
