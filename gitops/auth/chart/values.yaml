  # Quotas appliqués à chaque namespace étudiant
  namespace:
    quota:
      requestsCpu: "4"
      requestsMemory: "4Gi"
      limitsCpu: "8"
      limitsMemory: "8Gi"
      pods: "20"
      services: "10"
      persistentvolumeclaims: "5"
      requestsStorage: "20Gi"
    limitrange:
      defaultCpu: "250m"
      defaultMemory: "256Mi"
      defaultRequestCpu: "50m"
      defaultRequestMemory: "64Mi"
      maxCpu: "2"
      maxMemory: "2Gi"
