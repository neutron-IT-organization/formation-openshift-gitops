apiVersion: apps/v1
kind: Deployment
metadata:
  name: olympic-medals-app
  labels:
    app: olympic-medals-app
    formation: l04p01
spec:
  replicas: 1
  selector:
    matchLabels:
      app: olympic-medals-app
  template:
    metadata:
      labels:
        app: olympic-medals-app
    spec:
      containers:
        - name: olympic-medals-app
          image: quay.io/neutron-it/olympic-medals-app:latest
          ports:
            - containerPort: 5000
          resources:
            requests:
              cpu: "10m"
              memory: "128Mi"
            limits:
              cpu: "100m"
              memory: "128Mi"
